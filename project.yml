name: Termscape
options:
  bundleIdPrefix: com.termscape
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: none

settings:
  base:
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  Termscape:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: Info.plist
      properties:
        CFBundleName: Termscape
        CFBundleDisplayName: Termscape
        CFBundleIdentifier: com.termscape.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticGraphicsSwitching: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        SUFeedURL: "https://github.com/pedrotmr/termscape/releases/latest/download/appcast-preview.xml"
        SUPublicEDKey: "UvYTyKdoFBP2Sjg8XqioRhjri5DyesnVevvANMfaTQg="

    entitlements:
      path: termscape.entitlements

    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: Resources/termscape-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/Resources
        PRODUCT_BUNDLE_IDENTIFIER: com.termscape.app
        PRODUCT_NAME: Termscape
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        OTHER_LDFLAGS: "-lc++ -lz"

    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
      - path: Resources/Assets.xcassets

    dependencies:
      - framework: Resources/GhosttyKit.xcframework
        embed: false
      - package: Bonsplit
        product: Bonsplit
      - package: Sparkle
        product: Sparkle
      - sdk: Carbon.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: IOKit.framework
      - sdk: UniformTypeIdentifiers.framework

    preBuildScripts:
      - name: "Copy Ghostty Resources"
        script: |
          # Copy shell integration resources if present
          if [ -d "${SRCROOT}/Resources/shell-integration" ]; then
            cp -r "${SRCROOT}/Resources/shell-integration" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
          fi
          # Copy bundled editor web assets if present
          if [ -d "${SRCROOT}/Resources/Editor" ]; then
            rm -rf "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/Editor"
            cp -r "${SRCROOT}/Resources/Editor" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/"
          fi

  TermscapeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.termscape.tests
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: Tests
    dependencies:
      - target: Termscape

packages:
  Bonsplit:
    path: vendor/bonsplit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.9.1

schemes:
  Termscape:
    build:
      targets:
        Termscape: all
    test:
      targets:
        - TermscapeTests
