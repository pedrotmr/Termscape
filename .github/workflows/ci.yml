name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "16"

      - name: Install SwiftFormat and SwiftLint
        run: bash Scripts/ci/bootstrap-tooling.sh

      - name: SwiftFormat (lint)
        run: |
          export PATH="${GITHUB_WORKSPACE}/build/ci-tools/bin:${PATH}"
          swiftformat Sources Tests --lint

      - name: SwiftLint
        run: |
          export PATH="${GITHUB_WORKSPACE}/build/ci-tools/bin:${PATH}"
          swiftlint lint

      - name: Unit tests
        run: |
          xcodebuild \
            -project Termscape.xcodeproj \
            -scheme Termscape \
            -configuration Debug \
            -destination "platform=macOS" \
            -derivedDataPath "${GITHUB_WORKSPACE}/build/DerivedData" \
            test
