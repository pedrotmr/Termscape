name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tool versions
        run: |
          set -euo pipefail
          test -f .tool-versions
          echo "SWIFTFORMAT_VERSION=$(grep -E '^swiftformat ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "SWIFTLINT_VERSION=$(grep -E '^swiftlint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Install SwiftFormat
        run: |
          set -euo pipefail
          dest="${HOME}/.local/bin"
          mkdir -p "${dest}"
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.artifactbundle.zip" -o /tmp/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          cp "/tmp/swiftformat/swiftformat.artifactbundle/swiftformat-${SWIFTFORMAT_VERSION}-macos/bin/swiftformat" "${dest}/swiftformat"
          chmod +x "${dest}/swiftformat"
          echo "${dest}" >> "${GITHUB_PATH}"
          swiftformat --version

      - name: Install SwiftLint
        run: |
          set -euo pipefail
          dest="${HOME}/.local/bin"
          mkdir -p "${dest}"
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          cp /tmp/swiftlint/swiftlint "${dest}/swiftlint"
          chmod +x "${dest}/swiftlint"
          echo "${dest}" >> "${GITHUB_PATH}"
          swiftlint version

      - name: Formatting
        run: swiftformat --lint . --exclude vendor --swift-version 5.10

      - name: Linting
        run: swiftlint lint --strict --quiet

      - name: Build
        env:
          NSUnbufferedIO: "YES"
        run: xcodebuild -project Termscape.xcodeproj -scheme Termscape -destination "platform=macOS,arch=arm64" -quiet build

      - name: Test
        env:
          NSUnbufferedIO: "YES"
        run: xcodebuild -project Termscape.xcodeproj -scheme Termscape -destination "platform=macOS,arch=arm64" -quiet test
