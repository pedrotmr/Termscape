name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Read tool versions
        run: |
          echo "SWIFTFORMAT_VERSION=$(grep '^swiftformat ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"
          echo "SWIFTLINT_VERSION=$(grep '^swiftlint ' .tool-versions | awk '{print $2}')" >> "$GITHUB_ENV"

      - name: Install SwiftFormat
        run: |
          curl -sL "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.artifactbundle.zip" -o /tmp/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat-extract
          SWIFTFORMAT_BIN="$(find /tmp/swiftformat-extract -type f -path '*/bin/swiftformat' ! -path '*/.*' | head -1)"
          [[ -n "$SWIFTFORMAT_BIN" ]] || SWIFTFORMAT_BIN="$(find /tmp/swiftformat-extract -type f -name swiftformat ! -path '*/.*' | head -1)"
          [[ -n "$SWIFTFORMAT_BIN" ]] || { echo "::error::Could not locate swiftformat binary in artifact bundle"; exit 1; }
          sudo mkdir -p /usr/local/bin
          sudo cp "$SWIFTFORMAT_BIN" /usr/local/bin/swiftformat
          sudo chmod +x /usr/local/bin/swiftformat
          swiftformat --version

      - name: Install SwiftLint
        run: |
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip" -o /tmp/swiftlint.zip
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
          sudo cp /tmp/swiftlint/swiftlint /usr/local/bin/swiftlint
          sudo chmod +x /usr/local/bin/swiftlint
          swiftlint version

      # Full SwiftFormat rules are disabled until the tree is formatted once; sortImports
      # catches obvious import hygiene without requiring a repo-wide format pass.
      - name: Formatting
        run: swiftformat --lint . --exclude vendor --disable all --enable sortImports --swift-version 5.10

      - name: Linting
        run: swiftlint lint --strict --quiet

      - name: Setup GhosttyKit
        run: scripts/setup.sh
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve Swift packages
        run: xcodebuild -project Termscape.xcodeproj -scheme Termscape -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild -project Termscape.xcodeproj -scheme Termscape -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            -quiet build

      - name: Test
        run: |
          xcodebuild -project Termscape.xcodeproj -scheme Termscape -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            -quiet test
